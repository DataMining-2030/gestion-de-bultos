<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de Bultos</title>
  <style>
    #app-loading{position:fixed;inset:0;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s ease}
    #app-loading.hidden{opacity:0;pointer-events:none}
    .spinner{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:14px;font-size:13px;color:#64748b;font-family:system-ui,sans-serif}
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="spinner"></div>
    <span class="loading-text">Iniciando aplicacion...</span>
  </div>
  <div id="root"></div>
  <script>
    var el=document.getElementById("app-loading");
    var obs=new MutationObserver(function(){
      if(document.getElementById("root").children.length>0){
        el.classList.add("hidden");
        setTimeout(function(){el.style.display="none";},350);
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById("root"),{childList:true});
  </script>
</body>
</html>
