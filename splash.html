<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Centro de Control de Despacho</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(900px 420px at 50% 0%, rgba(37, 99, 235, 0.12), rgba(255, 255, 255, 0) 70%), linear-gradient(180deg, #f8fafc 0%, #ffffff 45%, #f8fafc 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px rgba(37, 99, 235, 0.25));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    .app-name {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .app-sub {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .progress-wrap {
      width: 200px;
      height: 4px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .status {
      font-size: 12px;
      color: #475569;
      min-height: 16px;
      text-align: center;
      transition: opacity 0.2s;
    }

    .dot {
      display: inline-block;
      animation: blink 1.2s infinite
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0
      }

      40% {
        opacity: 1
      }
    }

    .ok {
      color: #16a34a;
      font-weight: 600
    }

    .err {
      color: #dc2626;
      font-weight: 600
    }
  </style>
</head>

<body>
  <img class="logo" src="./assets/camion.png" alt="Camión Despacho" style="width: auto; height: 80px;" />
  <div class="app-name">Centro de Control de Despacho</div>
  <div class="app-sub">Data Mining &bull; v<span id="ver">-</span></div>
  <div class="progress-wrap">
    <div class="progress-bar" id="bar"></div>
  </div>
  <div class="status" id="status">
    Iniciando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
  <script>
    function setStatus(msg, pct, cls) {
      var el = document.getElementById('status');
      if (msg) {
        el.className = 'status' + (cls ? ' ' + cls : '');
        el.textContent = msg;
      }
      if (pct != null) {
        var bar = document.getElementById('bar');
        bar.style.transition = 'width 1s cubic-bezier(0.4, 0, 0.2, 1)';
        bar.style.width = pct + '%';
      }
    }
    function setVersion(v) { document.getElementById('ver').textContent = v || '-'; }
  </script>
</body>

</html>
